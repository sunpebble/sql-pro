<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6" />
      <stop offset="100%" style="stop-color:#1D4ED8" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA" />
      <stop offset="100%" style="stop-color:#3B82F6" />
    </linearGradient>
  </defs>

  <!-- Background with macOS-style rounded corners -->
  <!-- 10% padding on each side (102.4px), icon area is 819.2x819.2, centered -->
  <!-- Using 22.37% corner radius of the icon size (183px) -->
  <rect x="102" y="102" width="820" height="820" rx="184" ry="184" fill="url(#bg)" />

  <!-- Database cylinder - scaled and repositioned for padded icon -->
  <ellipse cx="512" cy="335" rx="192" ry="64" fill="url(#accent)" />
  <rect x="320" y="335" width="384" height="288" fill="url(#accent)" />
  <ellipse cx="512" cy="623" rx="192" ry="64" fill="#1D4ED8" />

  <!-- Cylinder rings -->
  <ellipse cx="512" cy="431" rx="192" ry="64" fill="none" stroke="#ffffff" stroke-width="6" opacity="0.3" />
  <ellipse cx="512" cy="527" rx="192" ry="64" fill="none" stroke="#ffffff" stroke-width="6" opacity="0.3" />

  <!-- SQL text -->
  <text x="512" y="800" font-family="system-ui, -apple-system, SF Pro Display, sans-serif" font-size="115" font-weight="700"
    fill="#ffffff" text-anchor="middle">SQL</text>

  <!-- Highlight on top ellipse -->
  <ellipse cx="512" cy="335" rx="160" ry="48" fill="#ffffff" opacity="0.2" />
</svg>
