<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6" />
      <stop offset="100%" style="stop-color:#1D4ED8" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA" />
      <stop offset="100%" style="stop-color:#3B82F6" />
    </linearGradient>
    <!-- macOS Big Sur squircle mask -->
    <clipPath id="squircle">
      <path d="M512 0C201.6 0 0 201.6 0 512s201.6 512 512 512 512-201.6 512-512S822.4 0 512 0z" 
            transform="scale(0.95) translate(26, 26)"/>
    </clipPath>
  </defs>

  <!-- Background with macOS-style rounded corners (continuous curve / squircle) -->
  <!-- Using 22.37% corner radius which is the macOS standard -->
  <rect x="0" y="0" width="1024" height="1024" rx="229" ry="229" fill="url(#bg)" />

  <!-- Database cylinder -->
  <ellipse cx="512" cy="320" rx="240" ry="80" fill="url(#accent)" />
  <rect x="272" y="320" width="480" height="360" fill="url(#accent)" />
  <ellipse cx="512" cy="680" rx="240" ry="80" fill="#1D4ED8" />

  <!-- Cylinder rings -->
  <ellipse cx="512" cy="440" rx="240" ry="80" fill="none" stroke="#ffffff" stroke-width="8" opacity="0.3" />
  <ellipse cx="512" cy="560" rx="240" ry="80" fill="none" stroke="#ffffff" stroke-width="8" opacity="0.3" />

  <!-- SQL text -->
  <text x="512" y="860" font-family="system-ui, -apple-system, SF Pro Display, sans-serif" font-size="144" font-weight="700"
    fill="#ffffff" text-anchor="middle">SQL</text>

  <!-- Highlight on top ellipse -->
  <ellipse cx="512" cy="320" rx="200" ry="60" fill="#ffffff" opacity="0.2" />
</svg>
