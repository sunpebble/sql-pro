      content="SQLite manager, SQLite GUI, SQLite database browser, SQLCipher, open source database tool, SQL editor, database management, cross-platform SQLite, ER diagram, visual diff, macOS database app, Windows SQLite, Linux SQLite, Monaco SQL editor, encrypted database, schema comparison"

    <!-- Open Graph / Facebook -->

      content="Free, cross-platform SQLite manager with encryption support, visual diff preview, Monaco editor, and AI-powered query tools. Open source under MIT license."

    <meta
      property="og:image"

    <meta property="og:locale:alternate" content="zh_CN" />

      name="twitter:title"
      content="Quarry — Open-Source SQLite Database Manager"

    />

      name="twitter:image"
      content="https://quarry.dev/screenshots/query-dark.png"
    />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://quarry.dev/" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Quarry",
        "applicationCategory": "DeveloperApplication",
        "operatingSystem": "macOS, Windows, Linux",
        "description": "A free, open-source SQLite database manager with SQLCipher encryption, visual diff preview, Monaco SQL editor, ER diagrams, and AI-powered query tools.",
        "url": "https://quarry.dev",
        "downloadUrl": "https://github.com/sunpebble/quarry/releases/latest",
        "license": "https://opensource.org/licenses/MIT",
        "isAccessibleForFree": true,
        "offers": [
          {
            "@type": "Offer",
            "price": "0",
            "priceCurrency": "USD",
            "description": "Free open-source version"
          },
          {
            "@type": "Offer",
            "price": "9",
            "priceCurrency": "USD",
            "description": "Pro monthly subscription"
          },
          {
            "@type": "Offer",
            "price": "199",
            "priceCurrency": "USD",
            "description": "Pro lifetime license"
          }
        ],
        "featureList": [
          "SQLite database management",
          "SQLCipher encrypted database support",
          "Monaco SQL editor with autocomplete",
          "Visual diff preview",
          "ER diagram visualization",
          "Schema and data comparison",
          "AI-powered query assistance",
          "Cross-platform (macOS, Windows, Linux)"
        ]
      }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <script>
      (function () {
        var theme = localStorage.getItem('quarry-theme') || 'system';
        var isDark =
          theme === 'dark' ||
          (theme === 'system' &&
            window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (isDark) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.add('light');
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
