<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Sunpebble brand: sun background hosts ink, never white (BRAND.md) -->
  <rect width="512" height="512" rx="100" fill="#F7B733"/>
  <g transform="translate(128, 100)">
    <!-- Database cylinder -->
    <rect x="28" y="40" width="200" height="200" fill="#232733"/>
    <ellipse cx="128" cy="240" rx="100" ry="30" fill="#161928"/>
    <ellipse cx="128" cy="40" rx="100" ry="30" fill="#232733"/>
    <!-- Middle rings -->
    <ellipse cx="128" cy="100" rx="100" ry="30" fill="none" stroke="rgba(255,246,232,0.35)" stroke-width="3"/>
    <ellipse cx="128" cy="170" rx="100" ry="30" fill="none" stroke="rgba(255,246,232,0.35)" stroke-width="3"/>
    <!-- Highlight on top ellipse -->
    <ellipse cx="128" cy="40" rx="80" ry="22" fill="rgba(255,246,232,0.15)"/>
  </g>
  <!-- SQL text -->
  <text x="256" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="80" font-weight="bold" fill="#232733" text-anchor="middle">SQL</text>
</svg>
