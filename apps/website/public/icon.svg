<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#1D4ED8"/>
    </linearGradient>
    <linearGradient id="cylinder" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA"/>
      <stop offset="50%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#2563EB"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <g transform="translate(128, 100)">
    <!-- Database cylinder -->
    <ellipse cx="128" cy="40" rx="100" ry="30" fill="#93C5FD" opacity="0.6"/>
    <rect x="28" y="40" width="200" height="200" fill="url(#cylinder)"/>
    <ellipse cx="128" cy="240" rx="100" ry="30" fill="#2563EB"/>
    <ellipse cx="128" cy="40" rx="100" ry="30" fill="#60A5FA"/>
    <!-- Middle rings -->
    <ellipse cx="128" cy="100" rx="100" ry="30" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="3"/>
    <ellipse cx="128" cy="170" rx="100" ry="30" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="3"/>
  </g>
  <!-- SQL text -->
  <text x="256" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="80" font-weight="bold" fill="white" text-anchor="middle">SQL</text>
</svg>