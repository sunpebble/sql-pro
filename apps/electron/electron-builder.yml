appId: com.sqlpro.app
productName: SQL Pro
copyright: Copyright © 2025 kunish

directories:
  buildResources: build

files:
  - from: .
    to: .
    filter:
      - package.json
      - out/**/*
      - '!out/**/*.map'
  # Include workspace root node_modules (where hoisted dependencies live)
  - from: ../../node_modules
    to: node_modules
    filter:
      - '**/*'
      - '!**/*.md'
      - '!**/*.ts'
      - '!**/*.map'
      - '!**/LICENSE*'
      - '!**/CHANGELOG*'
      - '!**/README*'
      - '!**/.github/**'
      - '!**/docs/**'
      - '!**/test/**'
      - '!**/tests/**'
      - '!**/__tests__/**'
      - '!**/example/**'
      - '!**/examples/**'
      # Exclude pnpm's virtual store (handled separately)
      - '!.pnpm/**'

# Native modules that need to be unpacked from asar
asarUnpack:
  - resources/**
  - node_modules/better-sqlite3-multiple-ciphers/**
  - node_modules/sharp/**

# Generate required update metadata files
generateUpdatesFilesForAllChannels: true

# macOS Configuration
mac:
  icon: resources/icon.icns
  category: public.app-category.developer-tools
  entitlementsInherit: build/entitlements.mac.plist
  notarize: false
  # Set identity to null to completely disable code signing for local builds
  # For production builds, remove this line or set a valid signing identity
  identity: null

dmg:
  artifactName: ${productName}-${version}.${ext}

# Windows Configuration
win:
  icon: resources/icon.ico

nsis:
  artifactName: ${productName}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always

# Linux Configuration
linux:
  target:
    - AppImage
    - snap
    - deb
  icon: resources/icons
  category: Development

appImage:
  artifactName: ${productName}-${version}.${ext}

npmRebuild: false

# Auto-update configuration - publish to GitHub releases
publish:
  provider: github
  owner: kunish-homelab
  repo: sql-pro
  releaseType: release
