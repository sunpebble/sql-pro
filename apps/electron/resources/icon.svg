<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Sunpebble brand: sun background hosts ink, never white (BRAND.md) -->

  <!-- Background: 10% padding (50px), 22% corner radius (412 * 0.22 ≈ 90) -->
  <rect x="50" y="50" width="412" height="412" rx="90" ry="90" fill="#F7B733" />

  <!-- Database cylinder -->
  <ellipse cx="256" cy="160" rx="120" ry="40" fill="#232733" />
  <rect x="136" y="160" width="240" height="180" fill="#232733" />
  <ellipse cx="256" cy="340" rx="120" ry="40" fill="#161928" />

  <!-- Cylinder rings -->
  <ellipse cx="256" cy="220" rx="120" ry="40" fill="none" stroke="#FFF6E8" stroke-width="4" opacity="0.35" />
  <ellipse cx="256" cy="280" rx="120" ry="40" fill="none" stroke="#FFF6E8" stroke-width="4" opacity="0.35" />

  <!-- SQL text -->
  <text x="256" y="430" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="700"
    fill="#232733" text-anchor="middle">SQL</text>

  <!-- Highlight on top ellipse -->
  <ellipse cx="256" cy="160" rx="100" ry="30" fill="#FFF6E8" opacity="0.15" />
</svg>
