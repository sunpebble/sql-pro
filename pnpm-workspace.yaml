packages:
  - 'packages/*'
  - 'apps/*'

nodeLinker: hoisted

neverBuiltDependencies: []

# pnpm catalogs: 集中管理依赖版本 (pnpm skill: features-catalogs)
# 使用方式: "react": "catalog:" 在 package.json 中
catalogs:
  default:
    # React
    react: ^19.2.7
    react-dom: ^19.2.7
    '@types/react': ^19.2.17
    '@types/react-dom': ^19.2.3
    # 开发工具
    typescript: ^6.0.3
    eslint: ^10.4.1
    prettier: ^3.9.4
    vite: ^8.1.3
    vitest: ^4.1.8
    tsx: ^4.22.4
    husky: ^9.1.7
    lint-staged: ^17.0.7
    '@vitejs/plugin-react': ^6.0.3

    # ESLint
    '@antfu/eslint-config': ^9.0.0
    '@commitlint/cli': ^21.0.2
    '@commitlint/config-conventional': ^21.0.2
    '@eslint-react/eslint-plugin': ^5.11.2
    eslint-plugin-react-hooks: ^7.1.1
    eslint-plugin-react-refresh: ^0.5.2
    prettier-plugin-tailwindcss: ^0.8.0

    # Tailwind
    tailwindcss: ^4.3.0
    '@tailwindcss/vite': ^4.3.0
    tw-animate-css: ^1.4.0

    # UI 基础
    '@base-ui/react': ^1.5.0
    lucide-react: ^1.17.0
    tailwind-merge: ^3.6.0
    class-variance-authority: ^0.7.1
    clsx: ^2.1.1
    cmdk: ^1.1.1
    sonner: ^2.0.7
    vaul: ^1.1.2
    input-otp: ^1.4.2
    embla-carousel-react: ^8.6.0
    date-fns: ^4.4.0
    react-day-picker: ^10.0.1
    react-resizable-panels: ^4.11.2
    recharts: ^3.8.1
    react-colorful: ^5.7.0
    framer-motion: ^12.40.0
    next-themes: ^0.4.6
    shadcn: ^4.11.0
    '@radix-ui/react-label': ^2.1.9

    # TanStack
    '@tanstack/db': ^0.6.8
    '@tanstack/query-core': ^5.101.0
    '@tanstack/query-db-collection': ^1.0.40
    '@tanstack/react-db': ^0.1.86
    '@tanstack/react-query': ^5.101.0
    '@tanstack/react-router': ^1.170.15
    '@tanstack/react-table': ^8.21.3
    '@tanstack/react-virtual': ^3.14.2

    # DnD Kit
    '@dnd-kit/core': ^6.3.1
    '@dnd-kit/modifiers': ^9.0.0
    '@dnd-kit/sortable': ^10.0.0
    '@dnd-kit/utilities': ^3.2.2

    # 数据库
    better-sqlite3-multiple-ciphers: ^12.10.0
    '@libsql/client': ^0.17.3
    mysql2: ^3.22.5
    mongodb: ^7.3.0
    mssql: ^12.5.5
    pg: ^8.21.0
    '@qdrant/js-client-rest': ^1.18.0

    # Monaco
    '@monaco-editor/react': ^4.7.0
    monaco-editor: ^0.55.1
    monaco-vim: ^0.4.4

    # i18n
    i18next: ^26.3.1
    i18next-browser-languagedetector: ^8.2.1
    react-i18next: ^17.0.8

    # 测试
    '@testing-library/jest-dom': ^6.9.1
    '@testing-library/react': ^16.3.2
    '@testing-library/user-event': ^14.6.1
    '@vitest/coverage-v8': ^4.1.8
    happy-dom: ^20.10.2
    playwright: ^1.60.0

    # 表单 & 校验
    '@hookform/resolvers': ^5.4.0
    react-hook-form: ^7.78.0
    zod: ^4.4.3
    ajv: ^8.20.0

    # Cloudflare
    hono: ^4.12.25
    wrangler: ^4.99.0
    '@cloudflare/workers-types': ^5.20260705.1
    stripe: ^22.2.0
    nanoid: ^5.1.16
    resend: ^6.12.4

    # Remotion
    '@remotion/cli': ^4.0.475
    '@remotion/transitions': ^4.0.475
    remotion: ^4.0.475

    # 图表 & 可视化
    '@xyflow/react': ^12.11.0
    dagre: ^0.8.5
    umap-js: ^1.4.0

    # 工具库
    eventemitter3: ^5.0.4
    exceljs: ^4.4.0
    express: ^5.2.1
    html-to-image: ^1.11.13
    minimatch: 10.2.4
    papaparse: ^5.5.3
    react-markdown: ^10.1.0
    react-resizable: ^4.0.1
    readable-stream: ^4.7.0
    remark-gfm: ^4.0.1
    sharp: ^0.35.3
    ssh2: ^1.17.0
    use-stick-to-bottom: ^1.1.6
    zustand: ^5.0.14
    builder-util-runtime: ^9.7.0
    '@ffmpeg-installer/ffmpeg': ^1.1.0
    '@ffprobe-installer/ffprobe': ^2.1.2

    # Types
    '@types/better-sqlite3': ^7.6.13
    '@types/dagre': ^0.7.54
    '@types/exceljs': ^1.3.2
    '@types/express': ^5.0.6
    '@types/mssql': ^12.3.0
    '@types/node': ^25.9.3
    '@types/papaparse': ^5.5.2
    '@types/pg': ^8.20.0
    '@types/react-resizable': ^4.0.0
    '@types/ssh2': ^1.15.5

    # Docs
    vitepress: 2.0.0-alpha.17

    # 其他
    '@typescript/native-preview': 7.0.0-dev.20260705.1

overrides:
  dompurify: 3.4.11
  esbuild: 0.28.1
  uuid: 11.1.1
  vite: 7.3.5
  # ssh2 → cpu-features uses nan; Electron/Node 24+ V8 needs newer nan (CI rebuild)
  nan: 2.26.2

allowBuilds:
  # ffmpeg/ffprobe installers ship one package per platform; list every
  # variant so CI runners (linux-x64) and packaging hosts pass too
  '@ffmpeg-installer/darwin-arm64': true
  '@ffmpeg-installer/darwin-x64': true
  '@ffmpeg-installer/linux-arm': true
  '@ffmpeg-installer/linux-arm64': true
  '@ffmpeg-installer/linux-ia32': true
  '@ffmpeg-installer/linux-x64': true
  '@ffmpeg-installer/win32-ia32': true
  '@ffmpeg-installer/win32-x64': true
  '@ffprobe-installer/darwin-arm64': true
  '@ffprobe-installer/darwin-x64': true
  '@ffprobe-installer/linux-arm': true
  '@ffprobe-installer/linux-arm64': true
  '@ffprobe-installer/linux-ia32': true
  '@ffprobe-installer/linux-x64': true
  '@ffprobe-installer/win32-ia32': true
  '@ffprobe-installer/win32-x64': true
  better-sqlite3-multiple-ciphers: true
  cpu-features: true
  electron: true
  electron-winstaller: true
  esbuild: true
  msw: true
  nx: set this to true or false
  sharp: true
  ssh2: true
  workerd: true

minimumReleaseAge: 0
