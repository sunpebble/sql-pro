packages:
  - 'packages/*'
  - 'apps/*'

nodeLinker: hoisted

neverBuiltDependencies: []

# pnpm catalogs: 集中管理依赖版本 (pnpm skill: features-catalogs)
# 使用方式: "react": "catalog:" 在 package.json 中
catalogs:
  default:
    # React
    react: ^19.2.4
    react-dom: ^19.2.4
    '@types/react': ^19.2.14
    '@types/react-dom': ^19.2.3

    # 开发工具
    typescript: ^5.9.3
    eslint: ^10.0.2
    prettier: ^3.8.1
    vite: ^7.3.1
    vitest: ^4.0.18
    tsx: ^4.21.0
    husky: ^9.1.7
    lint-staged: ^16.2.7
    '@vitejs/plugin-react': ^5.1.4

    # ESLint
    '@antfu/eslint-config': ^7.4.3
    '@commitlint/cli': ^20.4.2
    '@commitlint/config-conventional': ^20.4.2
    '@eslint-react/eslint-plugin': ^2.13.0
    eslint-plugin-react-hooks: ^7.0.1
    eslint-plugin-react-refresh: ^0.5.2
    prettier-plugin-tailwindcss: ^0.7.2

    # Nx
    nx: ^22.5.2
    '@nx/js': ^22.5.2
    '@nx/vite': ^22.5.2
    '@nx/workspace': ^22.5.2

    # Tailwind
    tailwindcss: ^4.2.1
    '@tailwindcss/vite': ^4.2.1
    tw-animate-css: ^1.4.0

    # UI 基础
    '@base-ui/react': ^1.2.0
    lucide-react: ^0.575.0
    tailwind-merge: ^3.5.0
    class-variance-authority: ^0.7.1
    clsx: ^2.1.1
    cmdk: ^1.1.1
    sonner: ^2.0.7
    vaul: ^1.1.2
    input-otp: ^1.4.2
    embla-carousel-react: ^8.6.0
    date-fns: ^4.1.0
    react-day-picker: ^9.13.2
    react-resizable-panels: ^4.6.5
    recharts: ^3.6.0
    react-colorful: ^5.6.1
    framer-motion: ^12.34.3
    next-themes: ^0.4.6
    shadcn: ^3.8.5
    '@radix-ui/react-label': ^2.1.8

    # TanStack
    '@tanstack/ai': ^0.5.1
    '@tanstack/ai-anthropic': ^0.5.0
    '@tanstack/ai-react': ^0.5.4
    '@tanstack/db': ^0.5.28
    '@tanstack/query-core': ^5.90.20
    '@tanstack/query-db-collection': ^1.0.25
    '@tanstack/react-db': ^0.1.72
    '@tanstack/react-query': ^5.90.21
    '@tanstack/react-router': ^1.162.8
    '@tanstack/react-table': ^8.21.3
    '@tanstack/react-virtual': ^3.13.19

    # AI SDK
    '@ai-sdk/anthropic': ^3.0.46
    '@ai-sdk/openai': ^3.0.31
    '@ai-sdk/openai-compatible': ^2.0.30
    '@ai-sdk/react': ^3.0.99
    '@anthropic-ai/claude-agent-sdk': ^0.2.50
    ai: ^6.0.97
    openai: ^6.23.0

    # DnD Kit
    '@dnd-kit/core': ^6.3.1
    '@dnd-kit/modifiers': ^9.0.0
    '@dnd-kit/sortable': ^10.0.0
    '@dnd-kit/utilities': ^3.2.2

    # Electron
    # NOTE: electron 版本必须硬编码在 apps/electron/package.json 中
    # 因为 electron-builder postinstall 无法解析 catalog: 协议
    electron-builder: ^26.8.1
    electron-vite: ^5.0.0
    electron-log: ^5.4.3
    electron-store: ^11.0.2
    electron-updater: ^6.8.3
    '@electron-toolkit/preload': ^3.0.2
    '@electron-toolkit/utils': ^4.0.0
    '@electron-toolkit/tsconfig': ^2.0.0
    '@electron/asar': ^4.0.1
    '@electron/notarize': ^3.1.1

    # 数据库
    better-sqlite3-multiple-ciphers: ^12.6.2
    '@libsql/client': ^0.17.0
    mysql2: ^3.18.0
    pg: ^8.18.0
    '@qdrant/js-client-rest': ^1.17.0

    # Monaco
    '@monaco-editor/react': ^4.7.0
    monaco-editor: ^0.55.1
    monaco-vim: ^0.4.4

    # i18n
    i18next: ^25.8.13
    i18next-browser-languagedetector: ^8.2.1
    react-i18next: ^16.5.4

    # 测试
    '@testing-library/jest-dom': ^6.9.1
    '@testing-library/react': ^16.3.2
    '@testing-library/user-event': ^14.6.1
    '@vitest/coverage-v8': ^4.0.18
    happy-dom: ^20.7.0
    playwright: ^1.58.2

    # 表单 & 校验
    '@hookform/resolvers': ^5.2.2
    react-hook-form: ^7.71.2
    zod: ^4.3.6
    ajv: ^8.18.0

    # Cloudflare
    hono: ^4.12.2
    wrangler: ^4.68.0
    '@cloudflare/workers-types': ^4.20260303.0
    stripe: ^20.3.1
    nanoid: ^5.1.6
    resend: ^6.9.2

    # Remotion
    '@remotion/cli': ^4.0.428
    '@remotion/transitions': ^4.0.428
    remotion: ^4.0.428

    # 图表 & 可视化
    '@xyflow/react': ^12.10.1
    dagre: ^0.8.5
    umap-js: ^1.4.0

    # 工具库
    eventemitter3: ^5.0.4
    exceljs: ^4.4.0
    express: ^5.2.1
    html-to-image: ^1.11.13
    minimatch: 10.2.2
    papaparse: ^5.5.3
    react-markdown: ^10.1.0
    react-resizable: ^3.1.3
    readable-stream: ^4.7.0
    remark-gfm: ^4.0.1
    sharp: ^0.34.5
    ssh2: ^1.17.0
    use-stick-to-bottom: ^1.1.3
    zustand: ^5.0.11
    builder-util-runtime: ^9.5.1
    '@ffmpeg-installer/ffmpeg': ^1.1.0
    '@ffprobe-installer/ffprobe': ^2.1.2

    # Types
    '@types/better-sqlite3': ^7.6.13
    '@types/dagre': ^0.7.53
    '@types/exceljs': ^1.3.2
    '@types/express': ^5.0.6
    '@types/node': ^25.3.0
    '@types/papaparse': ^5.5.2
    '@types/pg': ^8.16.0
    '@types/react-resizable': ^3.0.8
    '@types/ssh2': ^1.15.5

    # Docs
    vitepress: 2.0.0-alpha.16

    # 其他
    '@typescript/native-preview': 7.0.0-dev.20260223.1

overrides:
  '@img/sharp-darwin-arm64': 0.34.5
  '@img/sharp-libvips-darwin-arm64': 1.2.4
  vite: npm:rolldown-vite@latest
