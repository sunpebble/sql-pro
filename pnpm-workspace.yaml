packages:
  - 'packages/*'
  - 'apps/*'

nodeLinker: hoisted

neverBuiltDependencies: []

# pnpm catalogs: 集中管理依赖版本 (pnpm skill: features-catalogs)
# 使用方式: "react": "catalog:" 在 package.json 中
catalogs:
  default:
    # React
    react: ^19.2.5
    react-dom: ^19.2.5
    '@types/react': ^19.2.14
    '@types/react-dom': ^19.2.3
    # 开发工具
    typescript: ^6.0.2
    eslint: ^10.2.0
    prettier: ^3.8.1
    vite: ^8.0.7
    vitest: ^4.1.3
    tsx: ^4.21.0
    husky: ^9.1.7
    lint-staged: ^16.4.0
    '@vitejs/plugin-react': ^6.0.1

    # ESLint
    '@antfu/eslint-config': ^8.1.0
    '@commitlint/cli': ^20.5.0
    '@commitlint/config-conventional': ^20.5.0
    '@eslint-react/eslint-plugin': ^4.2.3
    eslint-plugin-react-hooks: ^7.0.1
    eslint-plugin-react-refresh: ^0.5.2
    prettier-plugin-tailwindcss: ^0.7.2

    # Nx
    nx: ^22.6.4
    '@nx/js': ^22.6.4
    '@nx/vite': ^22.6.4
    '@nx/workspace': ^22.6.4

    # Tailwind
    tailwindcss: ^4.2.2
    '@tailwindcss/vite': ^4.2.2
    tw-animate-css: ^1.4.0

    # UI 基础
    '@base-ui/react': ^1.3.0
    lucide-react: ^1.7.0
    tailwind-merge: ^3.5.0
    class-variance-authority: ^0.7.1
    clsx: ^2.1.1
    cmdk: ^1.1.1
    sonner: ^2.0.7
    vaul: ^1.1.2
    input-otp: ^1.4.2
    embla-carousel-react: ^8.6.0
    date-fns: ^4.1.0
    react-day-picker: ^9.14.0
    react-resizable-panels: ^4.9.0
    recharts: ^3.8.1
    react-colorful: ^5.6.1
    framer-motion: ^12.37.0
    next-themes: ^0.4.6
    shadcn: ^4.2.0
    '@radix-ui/react-label': ^2.1.8

    # TanStack
    '@tanstack/ai': ^0.10.1
    '@tanstack/ai-anthropic': ^0.7.2
    '@tanstack/ai-react': ^0.7.9
    '@tanstack/db': ^0.6.4
    '@tanstack/query-core': ^5.96.2
    '@tanstack/query-db-collection': ^1.0.35
    '@tanstack/react-db': ^0.1.82
    '@tanstack/react-query': ^5.96.2
    '@tanstack/react-router': ^1.168.10
    '@tanstack/react-table': ^8.21.3
    '@tanstack/react-virtual': ^3.13.23

    # AI SDK
    '@ai-sdk/anthropic': ^3.0.68
    '@ai-sdk/openai': ^3.0.52
    '@ai-sdk/openai-compatible': ^2.0.41
    '@ai-sdk/react': ^3.0.156
    '@anthropic-ai/claude-agent-sdk': ^0.2.97
    ai: ^6.0.154
    openai: ^6.34.0

    # DnD Kit
    '@dnd-kit/core': ^6.3.1
    '@dnd-kit/modifiers': ^9.0.0
    '@dnd-kit/sortable': ^10.0.0
    '@dnd-kit/utilities': ^3.2.2

    # Electron
    # NOTE: electron 版本必须硬编码在 apps/electron/package.json 中
    # 因为 electron-builder postinstall 无法解析 catalog: 协议
    electron-builder: ^26.8.1
    electron-vite: ^5.0.0
    electron-log: ^5.4.3
    electron-store: ^11.0.2
    electron-updater: ^6.8.3
    '@electron-toolkit/preload': ^3.0.2
    '@electron-toolkit/utils': ^4.0.0
    '@electron-toolkit/tsconfig': ^2.0.0
    '@electron/asar': ^4.2.0
    '@electron/notarize': ^3.1.1

    # 数据库
    better-sqlite3-multiple-ciphers: ^12.8.0
    '@libsql/client': ^0.17.2
    mysql2: ^3.20.0
    pg: ^8.20.0
    '@qdrant/js-client-rest': ^1.17.0

    # Monaco
    '@monaco-editor/react': ^4.7.0
    monaco-editor: ^0.55.1
    monaco-vim: ^0.4.4

    # i18n
    i18next: ^26.0.4
    i18next-browser-languagedetector: ^8.2.1
    react-i18next: ^17.0.2

    # 测试
    '@testing-library/jest-dom': ^6.9.1
    '@testing-library/react': ^16.3.2
    '@testing-library/user-event': ^14.6.1
    '@vitest/coverage-v8': ^4.1.3
    happy-dom: ^20.8.9
    playwright: ^1.59.1

    # 表单 & 校验
    '@hookform/resolvers': ^5.2.2
    react-hook-form: ^7.72.1
    zod: ^4.3.6
    ajv: ^8.18.0

    # Cloudflare
    hono: ^4.12.12
    wrangler: ^4.81.0
    '@cloudflare/workers-types': ^4.20260409.1
    stripe: ^22.0.1
    nanoid: ^5.1.7
    resend: ^6.10.0

    # Remotion
    '@remotion/cli': ^4.0.447
    '@remotion/transitions': ^4.0.447
    remotion: ^4.0.447

    # 图表 & 可视化
    '@xyflow/react': ^12.10.2
    dagre: ^0.8.5
    umap-js: ^1.4.0

    # 工具库
    eventemitter3: ^5.0.4
    exceljs: ^4.4.0
    express: ^5.2.1
    html-to-image: ^1.11.13
    minimatch: 10.2.5
    papaparse: ^5.5.3
    react-markdown: ^10.1.0
    react-resizable: ^3.1.3
    readable-stream: ^4.7.0
    remark-gfm: ^4.0.1
    sharp: ^0.34.5
    ssh2: ^1.17.0
    use-stick-to-bottom: ^1.1.3
    zustand: ^5.0.12
    builder-util-runtime: ^9.5.1
    '@ffmpeg-installer/ffmpeg': ^1.1.0
    '@ffprobe-installer/ffprobe': ^2.1.2

    # Types
    '@types/better-sqlite3': ^7.6.13
    '@types/dagre': ^0.7.54
    '@types/exceljs': ^1.3.2
    '@types/express': ^5.0.6
    '@types/node': ^25.5.2
    '@types/papaparse': ^5.5.2
    '@types/pg': ^8.20.0
    '@types/react-resizable': ^3.0.8
    '@types/ssh2': ^1.15.5

    # Docs
    vitepress: 2.0.0-alpha.17

    # 其他
    '@typescript/native-preview': 7.0.0-dev.20260408.1

overrides:
  '@img/sharp-darwin-arm64': 0.34.5
  '@img/sharp-libvips-darwin-arm64': 1.2.4
  vite: npm:rolldown-vite@latest
  # ssh2 → cpu-features uses nan; Electron/Node 24+ V8 needs newer nan (CI rebuild)
  nan: 2.26.2
