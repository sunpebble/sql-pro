name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version-file: .node-version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

  swift:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v7

      - name: Install homebrew database libraries
        run: |
          for tap in $(brew tap); do
            case "$tap" in homebrew/*) ;; *) brew trust "$tap" ;; esac
          done
          brew install sqlcipher postgresql@16 mysql

      - name: Build
        run: swift build
        working-directory: apps/swiftui

      - name: Test
        run: swift test
        working-directory: apps/swiftui

  docs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version-file: .node-version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs
        run: pnpm run docs:build
