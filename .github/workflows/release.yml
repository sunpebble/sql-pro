name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      # Root monorepo (path "." uses unprefixed keys)
      root--release_created: ${{ steps.release.outputs.release_created }}
      root--tag_name: ${{ steps.release.outputs.tag_name }}
      root--version: ${{ steps.release.outputs.version }}
      # Electron app (path-based prefix: apps/electron)
      electron--release_created: ${{ steps.release.outputs['apps/electron--release_created'] }}
      electron--tag_name: ${{ steps.release.outputs['apps/electron--tag_name'] }}
      electron--version: ${{ steps.release.outputs['apps/electron--version'] }}

    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-electron:
    needs: release-please
    if: ${{ needs.release-please.outputs.electron--release_created == 'true' }}
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            node_platform: darwin
            arch: arm64
          - os: macos-14
            platform: mac
            node_platform: darwin
            arch: x64
          - os: ubuntu-22.04
            platform: linux
            node_platform: linux
            arch: x64
          - os: windows-latest
            platform: win
            node_platform: win32
            arch: x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version-file: .node-version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libnotify-dev \
            libnss3 \
            libxss1 \
            libasound2-dev \
            libxtst-dev \
            libatspi2.0-dev \
            libdrm-dev \
            libgbm-dev \
            libxkbcommon-dev

      - name: Build Electron app
        run: pnpm run build
        working-directory: apps/electron

      - name: Rebuild native app dependencies
        run: pnpm exec electron-builder install-app-deps --platform ${{ matrix.node_platform }} --arch ${{ matrix.arch }}
        working-directory: apps/electron

      # electron-builder notarization reads the App Store Connect key from a
      # file path (APPLE_API_KEY); RUNNER_TEMP is wiped with the ephemeral VM
      - name: Write App Store Connect API key
        if: matrix.platform == 'mac'
        env:
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
        run: printf '%s\n' "$ASC_API_KEY_P8" > "$RUNNER_TEMP/AuthKey.p8"

      - name: Package Electron app (${{ matrix.platform }})
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # mac signing + notarization via sunpebble org secrets; empty (= unset
          # for electron-builder) on other platforms
          CSC_LINK: ${{ matrix.platform == 'mac' && secrets.DIST_CERT_P12 || '' }}
          CSC_KEY_PASSWORD: ${{ matrix.platform == 'mac' && secrets.DIST_CERT_PASSWORD || '' }}
          APPLE_API_KEY: ${{ matrix.platform == 'mac' && format('{0}/AuthKey.p8', runner.temp) || '' }}
          APPLE_API_KEY_ID: ${{ matrix.platform == 'mac' && secrets.ASC_KEY_ID || '' }}
          APPLE_API_ISSUER: ${{ matrix.platform == 'mac' && secrets.ASC_ISSUER_ID || '' }}
        run: pnpm exec electron-builder --${{ matrix.platform }} --${{ matrix.arch }} --config electron-builder.config.js --publish never
        working-directory: apps/electron

      - name: Upload artifacts to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.release-please.outputs.electron--tag_name }}
          files: |
            apps/electron/dist/*.dmg
            apps/electron/dist/*.zip
            apps/electron/dist/*.exe
            apps/electron/dist/*.msi
            apps/electron/dist/*.AppImage
            apps/electron/dist/*.deb
            apps/electron/dist/*.snap
            apps/electron/dist/*.blockmap
            apps/electron/dist/latest*.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release artifacts to R2
        if: ${{ (matrix.platform == 'mac' && matrix.arch == 'arm64') || matrix.platform == 'win' || matrix.platform == 'linux' }}
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          bash scripts/upload-release.sh ${{ needs.release-please.outputs.electron--version }}
        working-directory: apps/electron
