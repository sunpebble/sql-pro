name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      # Native SwiftUI app (path-based prefix: apps/swiftui)
      swiftui--release_created: ${{ steps.release.outputs['apps/swiftui--release_created'] }}
      swiftui--tag_name: ${{ steps.release.outputs['apps/swiftui--tag_name'] }}
      swiftui--version: ${{ steps.release.outputs['apps/swiftui--version'] }}

    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-swiftui:
    needs: release-please
    if: ${{ needs.release-please.outputs.swiftui--release_created == 'true' }}
    permissions:
      contents: write
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v7

      - name: Install homebrew database libraries
        run: |
          for tap in $(brew tap); do
            case "$tap" in homebrew/*) ;; *) brew trust "$tap" ;; esac
          done
          brew install sqlcipher postgresql@16 mysql

      - name: Run tests
        run: swift test
        working-directory: apps/swiftui

      - name: Import macOS signing certificate
        env:
          DIST_CERT_P12: ${{ secrets.DIST_CERT_P12 }}
          DIST_CERT_PASSWORD: ${{ secrets.DIST_CERT_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          printf '%s' "$DIST_CERT_P12" | base64 --decode > "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -k "$KEYCHAIN_PATH" -P "$DIST_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

      - name: Build, bundle, and sign Quarry.app
        run: ./scripts/package-app.sh "${{ needs.release-please.outputs.swiftui--version }}"
        working-directory: apps/swiftui

      - name: Write App Store Connect API key
        env:
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
        run: printf '%s\n' "$ASC_API_KEY_P8" > "$RUNNER_TEMP/AuthKey.p8"

      - name: Notarize and staple
        env:
          APPLE_API_KEY: ${{ format('{0}/AuthKey.p8', runner.temp) }}
          APPLE_API_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          VERSION="${{ needs.release-please.outputs.swiftui--version }}"
          ZIP_PATH="dist/Quarry-$VERSION.zip"
          DMG_PATH="dist/Quarry-$VERSION.dmg"
          DMG_ROOT="dist/dmg-root"

          submit_and_wait() {
            local path="$1"
            local submission_id
            submission_id=$(xcrun notarytool submit "$path" \
              --key "$APPLE_API_KEY" \
              --key-id "$APPLE_API_KEY_ID" \
              --issuer "$APPLE_API_ISSUER" \
              --output-format json | jq -r '.id')

            # ponytail: runner 网络瞬断会让 --wait 轮询直接失败，拆开 submit/wait 并重试轮询
            for attempt in 1 2 3 4 5; do
              xcrun notarytool wait "$submission_id" \
                --key "$APPLE_API_KEY" \
                --key-id "$APPLE_API_KEY_ID" \
                --issuer "$APPLE_API_ISSUER" \
                --timeout 30m && break
              [ "$attempt" -eq 5 ] && exit 1
              sleep 60
            done
          }

          create_dmg() {
            rm -rf "$DMG_ROOT"
            mkdir -p "$DMG_ROOT"
            cp -R dist/Quarry.app "$DMG_ROOT/"
            if diskutil image create from --help >/dev/null 2>&1; then
              diskutil image create from --format UDZO --volumeName Quarry "$DMG_ROOT" "$DMG_PATH"
            else
              hdiutil create -volname Quarry -srcfolder "$DMG_ROOT" -ov -format UDZO "$DMG_PATH"
            fi
            rm -rf "$DMG_ROOT"
          }

          submit_and_wait "$ZIP_PATH"

          # Staple the ticket to the .app and rebuild downloads so they run offline.
          xcrun stapler staple dist/Quarry.app
          xcrun stapler validate dist/Quarry.app
          rm "$ZIP_PATH" "$DMG_PATH"
          ditto -c -k --keepParent dist/Quarry.app "$ZIP_PATH"
          create_dmg
          submit_and_wait "$DMG_PATH"
          xcrun stapler staple "$DMG_PATH"
          xcrun stapler validate "$DMG_PATH"
        working-directory: apps/swiftui

      - name: Upload artifacts to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.release-please.outputs.swiftui--tag_name }}
          files: |
            apps/swiftui/dist/Quarry-${{ needs.release-please.outputs.swiftui--version }}.zip
            apps/swiftui/dist/Quarry-${{ needs.release-please.outputs.swiftui--version }}.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
