name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      # Root monorepo (path "." uses unprefixed keys)
      root--release_created: ${{ steps.release.outputs.release_created }}
      root--tag_name: ${{ steps.release.outputs.tag_name }}
      root--version: ${{ steps.release.outputs.version }}
      # Electron app (path-based prefix: apps/electron)
      electron--release_created: ${{ steps.release.outputs['apps/electron--release_created'] }}
      electron--tag_name: ${{ steps.release.outputs['apps/electron--tag_name'] }}
      electron--version: ${{ steps.release.outputs['apps/electron--version'] }}
      # Native SwiftUI app (path-based prefix: apps/swiftui)
      swiftui--release_created: ${{ steps.release.outputs['apps/swiftui--release_created'] }}
      swiftui--tag_name: ${{ steps.release.outputs['apps/swiftui--tag_name'] }}
      swiftui--version: ${{ steps.release.outputs['apps/swiftui--version'] }}

    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-electron:
    needs: release-please
    if: ${{ needs.release-please.outputs.electron--release_created == 'true' }}
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            node_platform: darwin
            arch: arm64
          - os: macos-14
            platform: mac
            node_platform: darwin
            arch: x64
          - os: ubuntu-22.04
            platform: linux
            node_platform: linux
            arch: x64
          - os: windows-latest
            platform: win
            node_platform: win32
            arch: x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version-file: .node-version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libnotify-dev \
            libnss3 \
            libxss1 \
            libasound2-dev \
            libxtst-dev \
            libatspi2.0-dev \
            libdrm-dev \
            libgbm-dev \
            libxkbcommon-dev

      - name: Build Electron app
        run: pnpm run build
        working-directory: apps/electron

      - name: Rebuild native app dependencies
        run: pnpm exec electron-builder install-app-deps --platform ${{ matrix.node_platform }} --arch ${{ matrix.arch }}
        working-directory: apps/electron

      # electron-builder notarization reads the App Store Connect key from a
      # file path (APPLE_API_KEY); RUNNER_TEMP is wiped with the ephemeral VM
      - name: Write App Store Connect API key
        if: matrix.platform == 'mac'
        env:
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
        run: printf '%s\n' "$ASC_API_KEY_P8" > "$RUNNER_TEMP/AuthKey.p8"

      - name: Import macOS signing certificate
        if: matrix.platform == 'mac'
        env:
          DIST_CERT_P12: ${{ secrets.DIST_CERT_P12 }}
          DIST_CERT_PASSWORD: ${{ secrets.DIST_CERT_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          printf '%s' "$DIST_CERT_P12" | base64 --decode > "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -k "$KEYCHAIN_PATH" -P "$DIST_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productbuild
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

      - name: Package Electron app (${{ matrix.platform }})
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # mac signing + notarization via sunpebble org secrets; empty (= unset
          # for electron-builder) on other platforms. The certificate is
          # imported above so codesign can use a keychain with an explicit
          # partition list instead of waiting for key access in CI.
          CSC_KEYCHAIN: ${{ matrix.platform == 'mac' && format('{0}/app-signing.keychain-db', runner.temp) || '' }}
          APPLE_API_KEY: ${{ matrix.platform == 'mac' && format('{0}/AuthKey.p8', runner.temp) || '' }}
          APPLE_API_KEY_ID: ${{ matrix.platform == 'mac' && secrets.ASC_KEY_ID || '' }}
          APPLE_API_ISSUER: ${{ matrix.platform == 'mac' && secrets.ASC_ISSUER_ID || '' }}
        run: pnpm exec electron-builder --${{ matrix.platform }} --${{ matrix.arch }} --config electron-builder.config.js --publish never
        working-directory: apps/electron

      - name: Notarize macOS DMG
        if: matrix.platform == 'mac'
        env:
          APPLE_API_KEY: ${{ format('{0}/AuthKey.p8', runner.temp) }}
          APPLE_API_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          DMG_PATH="$(find dist -maxdepth 1 -name '*.dmg' -print -quit)"
          if [ -z "$DMG_PATH" ]; then
            echo "No DMG found in dist"
            exit 1
          fi

          xcrun notarytool submit "$DMG_PATH" \
            --key "$APPLE_API_KEY" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER" \
            --wait
          xcrun stapler staple "$DMG_PATH"
          xcrun stapler validate "$DMG_PATH"
        working-directory: apps/electron

      - name: Upload artifacts to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.release-please.outputs.electron--tag_name }}
          files: |
            apps/electron/dist/*.dmg
            apps/electron/dist/*.zip
            apps/electron/dist/*.exe
            apps/electron/dist/*.msi
            apps/electron/dist/*.AppImage
            apps/electron/dist/*.deb
            apps/electron/dist/*.snap
            apps/electron/dist/*.blockmap
            apps/electron/dist/latest*.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release artifacts to R2
        if: ${{ (matrix.platform == 'mac' && matrix.arch == 'arm64') || matrix.platform == 'win' || matrix.platform == 'linux' }}
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          bash scripts/upload-release.sh ${{ needs.release-please.outputs.electron--version }}
        working-directory: apps/electron

  build-swiftui:
    needs: release-please
    if: ${{ needs.release-please.outputs.swiftui--release_created == 'true' }}
    permissions:
      contents: write
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v7

      - name: Install homebrew database libraries
        run: brew install sqlcipher postgresql@16 mysql

      - name: Run tests
        run: swift test
        working-directory: apps/swiftui

      - name: Import macOS signing certificate
        env:
          DIST_CERT_P12: ${{ secrets.DIST_CERT_P12 }}
          DIST_CERT_PASSWORD: ${{ secrets.DIST_CERT_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          printf '%s' "$DIST_CERT_P12" | base64 --decode > "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -k "$KEYCHAIN_PATH" -P "$DIST_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

      - name: Build, bundle, and sign Quarry.app
        run: ./scripts/package-app.sh "${{ needs.release-please.outputs.swiftui--version }}"
        working-directory: apps/swiftui

      - name: Write App Store Connect API key
        env:
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
        run: printf '%s\n' "$ASC_API_KEY_P8" > "$RUNNER_TEMP/AuthKey.p8"

      - name: Notarize and staple
        env:
          APPLE_API_KEY: ${{ format('{0}/AuthKey.p8', runner.temp) }}
          APPLE_API_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          ZIP_PATH="dist/Quarry-SwiftUI-${{ needs.release-please.outputs.swiftui--version }}-arm64.zip"

          SUBMISSION_ID=$(xcrun notarytool submit "$ZIP_PATH" \
            --key "$APPLE_API_KEY" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER" \
            --output-format json | jq -r '.id')

          # ponytail: runner 网络瞬断会让 --wait 轮询直接失败，拆开 submit/wait 并重试轮询
          for attempt in 1 2 3 4 5; do
            xcrun notarytool wait "$SUBMISSION_ID" \
              --key "$APPLE_API_KEY" \
              --key-id "$APPLE_API_KEY_ID" \
              --issuer "$APPLE_API_ISSUER" \
              --timeout 30m && break
            [ "$attempt" -eq 5 ] && exit 1
            sleep 60
          done

          # Staple the ticket to the .app and re-zip so the download runs offline.
          xcrun stapler staple dist/Quarry.app
          xcrun stapler validate dist/Quarry.app
          rm "$ZIP_PATH"
          ditto -c -k --keepParent dist/Quarry.app "$ZIP_PATH"
        working-directory: apps/swiftui

      - name: Upload artifacts to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.release-please.outputs.swiftui--tag_name }}
          files: apps/swiftui/dist/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
