name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      # Root monorepo (path "." uses unprefixed keys)
      root--release_created: ${{ steps.release.outputs.release_created }}
      root--tag_name: ${{ steps.release.outputs.tag_name }}
      root--version: ${{ steps.release.outputs.version }}
      # Electron app (path-based prefix: apps/electron)
      electron--release_created: ${{ steps.release.outputs['apps/electron--release_created'] }}
      electron--tag_name: ${{ steps.release.outputs['apps/electron--tag_name'] }}
      electron--version: ${{ steps.release.outputs['apps/electron--version'] }}
      # Website (path-based prefix: apps/website)
      website--release_created: ${{ steps.release.outputs['apps/website--release_created'] }}
      website--tag_name: ${{ steps.release.outputs['apps/website--tag_name'] }}
      website--version: ${{ steps.release.outputs['apps/website--version'] }}

    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-electron:
    needs: release-please
    if: ${{ needs.release-please.outputs.electron--release_created == 'true' }}
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            arch: arm64
          - os: macos-14
            platform: mac
            arch: x64
          - os: ubuntu-22.04
            platform: linux
            arch: x64
          - os: windows-latest
            platform: win
            arch: x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version-file: .node-version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libnotify-dev \
            libnss3 \
            libxss1 \
            libasound2-dev \
            libxtst-dev \
            libatspi2.0-dev \
            libdrm-dev \
            libgbm-dev \
            libxkbcommon-dev

      - name: Build Electron app
        run: pnpm run build
        working-directory: apps/electron

      - name: Package Electron app (${{ matrix.platform }})
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm exec electron-builder --${{ matrix.platform }} --config electron-builder.config.js --publish never
        working-directory: apps/electron

      - name: Upload artifacts to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.release-please.outputs.electron--tag_name }}
          files: |
            apps/electron/dist/*.dmg
            apps/electron/dist/*.zip
            apps/electron/dist/*.exe
            apps/electron/dist/*.msi
            apps/electron/dist/*.AppImage
            apps/electron/dist/*.deb
            apps/electron/dist/*.snap
            apps/electron/dist/*.blockmap
            apps/electron/dist/latest*.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release artifacts to R2
        if: ${{ (matrix.platform == 'mac' && matrix.arch == 'arm64') || matrix.platform == 'win' || matrix.platform == 'linux' }}
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          bash scripts/upload-release.sh ${{ needs.release-please.outputs.electron--version }}
        working-directory: apps/electron

  build-website:
    needs: release-please
    if: ${{ needs.release-please.outputs.website--release_created == 'true' || needs.release-please.outputs.root--release_created == 'true' }}

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version-file: .node-version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build website
        run: pnpm run website:build

      - name: Upload website build artifact
        uses: actions/upload-artifact@v7
        with:
          name: website-dist
          path: apps/website/dist
          retention-days: 30

  deploy-website:
    needs: [release-please, build-website]
    if: ${{ needs.release-please.outputs.website--release_created == 'true' || needs.release-please.outputs.root--release_created == 'true' }}

    runs-on: ubuntu-latest

    steps:
      - name: Download website build artifact
        uses: actions/download-artifact@v8
        with:
          name: website-dist
          path: apps/website/dist

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/website/dist --project-name=sqlpro-website
