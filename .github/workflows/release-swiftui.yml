name: Release SwiftUI App

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.1.0)'
        required: true
      publish:
        description: 'Create the GitHub Release (false = build and sign only)'
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: release-swiftui-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-sign-release:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v7

      - name: Install homebrew database libraries
        run: brew install sqlcipher postgresql@16 mysql

      - name: Run tests
        run: swift test
        working-directory: apps/swiftui

      - name: Import macOS signing certificate
        env:
          DIST_CERT_P12: ${{ secrets.DIST_CERT_P12 }}
          DIST_CERT_PASSWORD: ${{ secrets.DIST_CERT_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          printf '%s' "$DIST_CERT_P12" | base64 --decode > "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -k "$KEYCHAIN_PATH" -P "$DIST_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

      - name: Build, bundle, and sign Quarry.app
        run: ./scripts/package-app.sh "${{ inputs.version }}"
        working-directory: apps/swiftui

      - name: Write App Store Connect API key
        env:
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
        run: printf '%s\n' "$ASC_API_KEY_P8" > "$RUNNER_TEMP/AuthKey.p8"

      - name: Notarize and staple
        env:
          APPLE_API_KEY: ${{ format('{0}/AuthKey.p8', runner.temp) }}
          APPLE_API_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          ZIP_PATH="dist/Quarry-SwiftUI-${{ inputs.version }}-arm64.zip"

          xcrun notarytool submit "$ZIP_PATH" \
            --key "$APPLE_API_KEY" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER" \
            --wait

          # Staple the ticket to the .app and re-zip so the download runs offline.
          xcrun stapler staple dist/Quarry.app
          xcrun stapler validate dist/Quarry.app
          rm "$ZIP_PATH"
          ditto -c -k --keepParent dist/Quarry.app "$ZIP_PATH"
        working-directory: apps/swiftui

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: quarry-swiftui-${{ inputs.version }}
          path: apps/swiftui/dist/*.zip

      - name: Create GitHub Release
        if: ${{ inputs.publish }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "quarry-swiftui-v${{ inputs.version }}" \
            apps/swiftui/dist/Quarry-SwiftUI-${{ inputs.version }}-arm64.zip \
            --target "$GITHUB_SHA" \
            --title "Quarry SwiftUI v${{ inputs.version }}" \
            --notes "Native SwiftUI build of Quarry (Apple Silicon, signed and notarized). SQLite/SQLCipher, PostgreSQL, and MySQL support."
